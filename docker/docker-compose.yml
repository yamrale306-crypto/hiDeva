version: '3.9'

services:
  web:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    ports:
      - '4173:4173'
    environment:
      - NODE_ENV=production
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hideva
    volumes:
      - hideva-db-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

volumes:
  hideva-db-data:
