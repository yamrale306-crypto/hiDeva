# ============================================================
# hiDeva — Portable pnpm-workspace.yaml
# Use this file OUTSIDE of Replit (macOS, Windows, Linux).
#
# Instructions:
#   1. Rename this file to pnpm-workspace.yaml
#   2. Replace the existing pnpm-workspace.yaml with this one
#   3. Run: pnpm install
# ============================================================

packages:
  - artifacts/*
  - lib/*
  - scripts

catalog:
  '@replit/vite-plugin-cartographer': ^0.5.21
  '@replit/vite-plugin-dev-banner': ^0.1.1
  '@replit/vite-plugin-runtime-error-modal': ^0.0.6
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.3.3
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.2
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  # Must be this exact version because expo requires it
  react: 19.1.0
  # Must be this exact version because expo requires it
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: ^4.21.0
  vite: ^7.3.2
  wouter: ^3.3.5
  zod: ^3.25.76

autoInstallPeers: false

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msw
  - unrs-resolver

overrides:
  # drizzle-kit uses esbuild internally — override to tsx
  "@esbuild-kit/esm-loader": "npm:tsx@^4.21.0"
  # Pin esbuild version for consistency
  esbuild: "0.27.3"
